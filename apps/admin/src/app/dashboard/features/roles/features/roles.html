<section class="flex flex-col gap-6 p-4 sm:p-6 lg:p-8">
  <div class="flex flex-col gap-4 xl:flex-row xl:items-center xl:justify-between">
    <div>
      <h1 class="text-2xl font-semibold text-on-surface">Rôles</h1>
      <p class="mt-1 text-sm text-on-surface-variant">Gérez les rôles disponibles pour les utilisateurs.</p>
    </div>

    <button matButton="filled" (click)="createRole()">
      <mat-icon svgIcon="plus" />
      Ajouter un rôle
    </button>
  </div>

  <mat-card appearance="filled" class="flex flex-col">
    <mat-card-header>
      <div class="flex flex-auto flex-col gap-4 md:flex-row md:items-center">
        <div class="flex items-center gap-x-2">
          <mat-icon class="size-4" svgIcon="shield-check" />
          <div class="font-medium tracking-tight">Liste des rôles</div>
        </div>

        <mat-form-field class="w-full md:ml-auto md:max-w-sm">
          <mat-icon matPrefix svgIcon="search" />
          <input matInput [formControl]="searchControl" placeholder="Nom du rôle" />
        </mat-form-field>
      </div>
    </mat-card-header>

    <mat-card-content class="flex flex-auto flex-col overflow-hidden p-0">
      <div class="flex flex-col">
        <div class="relative isolate overflow-x-visible overflow-y-hidden">
          @if (rolesStore.isLoading()) {
          <div class="absolute inset-0 z-10 flex items-center justify-center bg-surface/70">
            <mat-spinner diameter="36" />
          </div>
          }

          <table class="-mt-px whitespace-nowrap" mat-table [dataSource]="rolesStore.roles()" [trackBy]="trackBy">
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef>Nom</th>
              <td mat-cell *matCellDef="let role">{{ role.name }}</td>
            </ng-container>

            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef class="w-32 text-right">Actions</th>
              <td mat-cell *matCellDef="let role" class="text-right">
                <button matIconButton type="button" aria-label="Modifier le rôle" (click)="editRole(role)">
                  <mat-icon svgIcon="pencil" />
                </button>
                <button matIconButton type="button" aria-label="Supprimer le rôle" (click)="deleteRole(role)">
                  <mat-icon svgIcon="trash-2" />
                </button>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr
              class="group hover:bg-on-surface-variant/4 relative"
              mat-row
              *matRowDef="let row; columns: displayedColumns"></tr>
          </table>

          @if (!rolesStore.isLoading() && rolesStore.roles().length === 0) {
          <div class="flex min-h-32 items-center justify-center text-sm text-on-surface-variant">
            Aucun rôle trouvé.
          </div>
          }
        </div>
      </div>
    </mat-card-content>

    <mat-paginator
      [length]="rolesStore.total()"
      [pageIndex]="query.page - 1"
      [pageSize]="query.limit"
      [pageSizeOptions]="[20, 50, 100]"
      (page)="pageChanged($event)"
      showFirstLastButtons />
  </mat-card>
</section>
