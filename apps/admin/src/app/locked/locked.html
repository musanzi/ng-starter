<main
  class="relative flex min-h-screen overflow-hidden bg-neutral-50 text-neutral-950 dark:bg-neutral-950 dark:text-white">
  <section
    class="relative mx-auto w-full max-w-6xl flex justify-center items-center content-center gap-10 px-6 py-10 sm:px-8 lg:px-10">
    <div class="max-w-2xl">
      <div
        class="mb-8 inline-flex items-center gap-2 rounded-full border border-error-200 bg-error-50 px-3 py-1 text-sm font-medium text-error-700 dark:border-error-900/70 dark:bg-error-950/40 dark:text-error-300">
        <mat-icon class="size-4" svgIcon="lock" />
        Accès restreint
      </div>

      <h1 class="max-w-xl text-4xl leading-10 font-semibold sm:text-5xl">Vous n'avez pas accès à cette application.</h1>

      <p class="mt-5 max-w-xl text-lg leading-7 text-neutral-600 dark:text-neutral-300">
        Vous êtes connecté à votre compte, mais celui-ci ne dispose pas des droits d'administrateur nécessaires pour
        ouvrir cet espace de travail.
      </p>

      <div class="mt-8 flex flex-col gap-3 sm:flex-row">
        <button matButton="filled" type="button" [disabled]="authStore.isVerifying()" (click)="refreshAccess()">
          {{ authStore.isVerifying() ? "Vérification de l'accès..." : "Vérifier à nouveau l'accès" }}
        </button>
      </div>
    </div>
  </section>
</main>
