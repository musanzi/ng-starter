<div class="flex flex-auto items-center justify-center p-4 sm:p-12">
  <mat-card class="flex w-full max-w-sm flex-col p-8 sm:p-12">
    <button
      type="button"
      class="mb-4 inline-flex cursor-pointer text-primary-700 items-center self-start text-sm font-medium underline-offset-4 hover:underline"
      (click)="goBack()"
    >
      <mat-icon class="mr-1 size-4" svgIcon="arrow-left"></mat-icon>
      <span>Retour</span>
    </button>

    <div class="text-4xl leading-tight font-extrabold tracking-tight">Lien envoyé</div>
    <div class="mt-3 font-medium text-neutral-600">
      Si cette adresse e-mail est associée à un compte, un lien de réinitialisation vient d'être envoyé. Le lien expire
      dans 15 minutes.
    </div>

    <a
      class="mt-8 inline-flex items-center self-start text-sm font-medium underline underline-offset-4 hover:underline"
      routerLink="/auth/sign-in"
    >
      <mat-icon class="mr-1 size-4" svgIcon="arrow-left"></mat-icon>
      <span>Retour à la connexion</span>
    </a>
  </mat-card>
</div>
