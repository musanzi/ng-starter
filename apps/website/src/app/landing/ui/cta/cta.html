<section id="demarrer" class="bg-white py-20 dark:bg-neutral-950">
  <div class="mx-auto w-full max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="flex flex-col items-start justify-between gap-8 border-t border-neutral-200 pt-12 md:flex-row md:items-center dark:border-neutral-800">
      <div class="max-w-2xl">
        <h2 class="text-4xl font-bold text-neutral-950 dark:text-white">Prêt à construire la suite ?</h2>
        <p class="mt-4 text-xl leading-7 text-neutral-600 dark:text-neutral-300">
          Gardez cette page comme point d'entrée propre, puis remplacez les sections au rythme de votre produit.
        </p>
      </div>

      @if (isAuthenticated()) {
        <a matButton="filled" routerLink="/dashboard">
          Ouvrir le tableau de bord
          <mat-icon class="ml-2 size-4" svgIcon="arrow-right" />
        </a>
      } @else {
        <a matButton="filled" routerLink="/auth/sign-in">
          Démarrer maintenant
          <mat-icon class="ml-2 size-4" svgIcon="arrow-right" />
        </a>
      }
    </div>
  </div>
</section>
