<section id="fonctionnalites" class="bg-neutral-50 py-20 dark:bg-neutral-900/40">
  <div class="mx-auto w-full max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="max-w-2xl">
      <h2 class="text-4xl font-bold text-neutral-950 dark:text-white">Une base volontairement simple.</h2>
      <p class="mt-4 text-xl leading-7 text-neutral-600 dark:text-neutral-300">
        Le starter donne juste ce qu'il faut pour avancer vite sans imposer une expérience produit trop spécifique.
      </p>
    </div>

    <div class="mt-10 grid gap-4 md:grid-cols-3">
      @for (feature of features; track feature.title) {
        <article class="rounded-lg border border-neutral-200 bg-white p-6 dark:border-neutral-800 dark:bg-neutral-950">
          <div class="flex size-11 items-center justify-center rounded bg-primary-50 text-primary-700 dark:bg-primary-950/60 dark:text-primary-300">
            <mat-icon class="size-5" [svgIcon]="feature.icon" />
          </div>
          <h3 class="mt-5 text-2xl font-semibold text-neutral-950 dark:text-white">{{ feature.title }}</h3>
          <p class="mt-3 text-md leading-6 text-neutral-600 dark:text-neutral-400">{{ feature.description }}</p>
        </article>
      }
    </div>
  </div>
</section>
