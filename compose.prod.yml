services:
  website:
    image: starter-admin
    build:
      context: .
      target: production
    restart: unless-stopped
    command: pnpm ssr:website --host=0.0.0
    ports:
      - '4200:4200'

  admin:
    image: starter-admin
    build:
      context: .
      target: production
    restart: unless-stopped
    command: pnpm ssr:admin --host=0.0.0
    ports:
      - '4300:4300'
